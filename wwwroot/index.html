<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MonApi — Produits</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">MonApi</span>
      <span class="tag">v1.0</span>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <h1>Produits</h1>
      <button id="btn-add" class="btn btn-primary">+ Nouveau produit</button>
    </div>

    <!-- Formulaire (caché par défaut) -->
    <div id="form-card" class="card hidden">
      <h2 id="form-title">Nouveau produit</h2>
      <div class="form-group">
        <label for="input-nom">Nom</label>
        <input id="input-nom" type="text" placeholder="Ex : Clavier mécanique" />
      </div>
      <div class="form-group">
        <label for="input-prix">Prix ($)</label>
        <input id="input-prix" type="number" step="0.01" placeholder="Ex : 49.99" />
      </div>
      <div class="form-actions">
        <button id="btn-cancel" class="btn btn-ghost">Annuler</button>
        <button id="btn-save" class="btn btn-primary">Enregistrer</button>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Table -->
    <div class="card">
      <table id="table-products">
        <thead>
          <tr>
            <th>#</th>
            <th>Nom</th>
            <th>Prix</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <p id="empty-state" class="empty hidden">Aucun produit pour l'instant.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
